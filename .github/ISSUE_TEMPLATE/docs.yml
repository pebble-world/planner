name: Documentation
description: Documentation needs writing or updating.
title: "[Docs]: "
labels: ["docs"]
body:
  - type: textarea
    id: subject
    attributes:
      label: What needs documenting?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Audience / location
      description: Who is this for and where should it live (README, dartdoc, CONTRIBUTING, wiki)?
  - type: textarea
    id: notes
    attributes:
      label: Additional context
